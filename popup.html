<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jeffi Gallery Uploader</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 320px;
      padding: 16px;
      background: #f9fafb;
      color: #111827;
    }
    h1 {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 14px;
      color: #1f2937;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 12px;
      background: #fff;
      color: #111827;
      margin-bottom: 10px;
      outline: none;
    }
    input:focus { border-color: #6366f1; }
    button {
      width: 100%;
      padding: 9px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #4f46e5; }
    #status {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
      min-height: 16px;
      color: #16a34a;
    }
    #status.error { color: #dc2626; }
  </style>
</head>
<body>
  <h1>Jeffi Gallery Uploader</h1>

  <label for="apiUrl">API URL</label>
  <input type="url" id="apiUrl" placeholder="https://jeffistores.in" />

  <label for="adminToken">Admin Token</label>
  <input type="password" id="adminToken" placeholder="Paste token from Admin Settings" />

  <button id="save">Save Settings</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
