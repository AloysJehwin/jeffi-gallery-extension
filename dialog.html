<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Save to Gallery</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 300px;
      padding: 16px;
      background: #fff;
      color: #111827;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .header img { width: 24px; height: 24px; border-radius: 4px; }
    .header h1 { font-size: 13px; font-weight: 700; color: #1f2937; }
    .preview {
      width: 100%;
      height: 140px;
      object-fit: contain;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
      background: #f3f4f6;
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #374151;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      color: #111827;
      outline: none;
      margin-bottom: 12px;
    }
    input:focus { border-color: #6366f1; }
    .actions { display: flex; gap: 8px; }
    button {
      flex: 1;
      padding: 8px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
    }
    #cancelBtn {
      background: #f3f4f6;
      color: #374151;
    }
    #cancelBtn:hover { background: #e5e7eb; }
    #saveBtn {
      background: #6366f1;
      color: #fff;
    }
    #saveBtn:hover { background: #4f46e5; }
    #saveBtn:disabled { background: #a5b4fc; cursor: not-allowed; }
    #status {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
      min-height: 16px;
    }
    .uploading { color: #6366f1; }
    .success { color: #16a34a; }
    .error { color: #dc2626; }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/48.png" alt="logo" />
    <h1>Save to Jeffi Gallery</h1>
  </div>

  <img id="preview" class="preview" src="" alt="preview" />

  <label for="nameInput">Image Name</label>
  <input type="text" id="nameInput" placeholder="e.g. red-valve-50mm" autofocus />

  <div class="actions">
    <button id="cancelBtn">Cancel</button>
    <button id="saveBtn">Save to Gallery</button>
  </div>
  <div id="status"></div>

  <script src="dialog.js"></script>
</body>
</html>
